<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMTECH | Card Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="screen-splash" class="screen">
            <div class="floating-name">Aishat</div>
            <h1 class="kamtech-logo">KAMTECH</h1>
            <button class="btn-primary" onclick="showScreen('screen-warning')">START GAME</button>
        </div>

        <div id="screen-warning" class="screen" style="display:none;">
            <h2 class="neon-text">18+ WARNING</h2>
            <div class="warning-box">
                <p>Pick a card. Answer or Dare. Reply Live.</p>
                <p style="font-size: 0.8rem; color: #888;">By playing, you agree to the rules of the game.</p>
            </div>
            <button class="btn-primary" onclick="showScreen('screen-lobby')">I AGREE</button>
        </div>

        <div id="screen-lobby" class="screen" style="display:none;">
            <button class="btn-secondary" id="btn-create">CREATE GAME</button>
            <div style="margin: 20px 0;">
                <input type="text" id="join-input" placeholder="6-Digit Code">
                <button class="btn-secondary" id="btn-join">JOIN GAME</button>
            </div>
            <p id="room-display" class="neon-text" style="font-size: 1.5rem;"></p>
        </div>

        <div id="screen-modes" class="screen" style="display:none;">
            <h3 class="neon-text">CHOOSE GAME MODE</h3>
            <button class="btn-mode" onclick="setMode(1)">Mode 1: Card Roulette</button>
            <button class="btn-mode" onclick="setMode(2)">Mode 2: Shuffled Deal</button>
            <button class="btn-mode" onclick="setMode(3)">Mode 3: Free Pick</button>
        </div>

        <div id="screen-game" class="screen" style="display:none;">
            <div id="card-container" class="card-grid"></div>
            
            <div id="question-display" class="modal" style="display:none;">
                <div class="modal-content">
                    <p id="question-text" class="neon-text" style="font-size: 1.2rem; margin-bottom: 20px;"></p>
                    <hr style="border: 0.5px solid #00ff41; opacity: 0.3;">
                    
                    <div id="reply-area" style="margin-top: 20px;">
                        <p id="reply-display" style="color: #00ff41; font-weight: bold; min-height: 25px; border-left: 2px solid #00ff41; padding-left: 10px; margin-bottom: 15px;"></p>
                        <input type="text" id="reply-input" placeholder="Type your answer here...">
                        <button class="btn-primary" onclick="sendReply()">SEND ANSWER</button>
                    </div>

                    <button id="btn-next" class="btn-secondary" onclick="closeQuestion()" style="margin-top:30px; background: #004400;">FINISH TURN & SWAP</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
